<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导航页</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <svg width="22" height="22" viewBox="0 0 64 64" fill="none" aria-label="导航页">
      <rect width="64" height="64" rx="14" fill="var(--color-primary)"/>
      <rect x="10" y="10" width="18" height="18" rx="4" fill="white" opacity="0.95"/>
      <rect x="36" y="10" width="18" height="18" rx="4" fill="white" opacity="0.6"/>
      <rect x="10" y="36" width="18" height="18" rx="4" fill="white" opacity="0.6"/>
      <rect x="36" y="36" width="8" height="8" rx="2" fill="white" opacity="0.9"/>
      <rect x="46" y="36" width="8" height="8" rx="2" fill="white" opacity="0.5"/>
      <rect x="36" y="46" width="8" height="8" rx="2" fill="white" opacity="0.5"/>
      <rect x="46" y="46" width="8" height="8" rx="2" fill="white" opacity="0.3"/>
      <path d="M19 15 L23 22 L19 20.5 L15 22 Z" fill="var(--color-primary)" opacity="0.8"/>
    </svg>
    <span class="sidebar-logo-text">我的导航</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">分类</div>
    <div id="cat-list">
      <div class="cat-item active" data-id="all" onclick="App.selectCat('all')">
        <div class="cat-dot" style="background:#7a7974"></div>
        <span>全部</span>
        <span class="cat-count" id="count-all">0</span>
      </div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="btn-ghost-sm" onclick="App.openCatModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      新分类
    </button>
    <button class="btn-ghost-sm" id="undo-btn" disabled onclick="App.undo()" title="撤销上一步 (⌘Z)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 7v6h6"/><path d="M3 13A9 9 0 1 0 6 6.7L3 13"/></svg>
      撤销
    </button>
    <button class="btn-ghost-sm" onclick="App.exportData()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      导出
    </button>
    <!-- JSON 导入 -->
    <label class="btn-ghost-sm" style="cursor:pointer" title="导入 JSON">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      JSON
      <input type="file" accept=".json" style="display:none" onchange="App.importJson(event)">
    </label>
    <!-- Chrome 书签 HTML 导入 -->
    <label class="btn-ghost-sm" style="cursor:pointer" title="导入 Chrome 书签 HTML">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 3a4.5 4.5 0 000 9 4.5 4.5 0 000-9z"/><path d="M3 12h18"/></svg>
      浏览器
      <input type="file" accept=".html,.htm" style="display:none" onchange="App.importChromeHtml(event)">
    </label>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<div id="main">
  <header id="topbar">
    <div id="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="搜索书签… (⌘K)" oninput="App.handleSearch(this.value)" autocomplete="off">
    </div>
    <div style="flex:1"></div>
    <button class="btn-icon" data-theme-toggle title="切换深色/浅色">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="btn-primary" onclick="App.openBkModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      添加书签
    </button>
  </header>
  <div id="content"><div id="view-root"></div></div>
</div>

<!-- ===== 书签弹窗 ===== -->
<div class="overlay" id="bk-modal" onclick="if(event.target===this)App.closeBkModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="bk-modal-title">添加书签</span>
      <button class="modal-close" onclick="App.closeBkModal()">×</button>
    </div>
    <!-- 去重警告 -->
    <div id="bk-dup-warning" class="dup-warning" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span class="dup-text">已存在相同书签</span>
    </div>
    <div class="form-group">
      <label class="form-label">网址 *</label>
      <input class="form-input" id="bk-url" type="url" placeholder="https://example.com" oninput="App.onUrlInput(this.value)">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">名称 *</label>
        <input class="form-input" id="bk-title" type="text" placeholder="网站名称">
      </div>
      <div class="form-group">
        <label class="form-label">分类</label>
        <select class="form-input" id="bk-cat"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">描述</label>
      <input class="form-input" id="bk-desc" type="text" placeholder="可选备注">
    </div>
    <div class="form-group">
      <label class="form-label">标签（逗号分隔）</label>
      <input class="form-input" id="bk-tags" type="text" placeholder="例：工具, AI, 设计">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="App.closeBkModal()">取消</button>
      <button class="btn-primary" onclick="App.saveBk()">保存</button>
    </div>
  </div>
</div>

<!-- ===== 分类弹窗 ===== -->
<div class="overlay" id="cat-modal" onclick="if(event.target===this)App.closeCatModal()">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title" id="cat-modal-title">新建分类</span>
      <button class="modal-close" onclick="App.closeCatModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">分类名称 *</label>
      <input class="form-input" id="cat-name" type="text" placeholder="例：工作、学习、娱乐">
    </div>
    <div class="form-group">
      <label class="form-label">颜色</label>
      <div class="color-opts" id="color-opts"></div>
    </div>
    <div class="form-actions">
      <button class="btn-danger" id="cat-del-btn" style="display:none" onclick="App.deleteCatConfirm()">删除分类</button>
      <div style="flex:1"></div>
      <button class="btn-secondary" onclick="App.closeCatModal()">取消</button>
      <button class="btn-primary" onclick="App.saveCat()">保存</button>
    </div>
  </div>
</div>

<!-- ===== 导入确认弹窗 ===== -->
<div class="overlay" id="import-modal" onclick="if(event.target===this)App.closeImportModal()">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">导入书签</span>
      <button class="modal-close" onclick="App.closeImportModal()">×</button>
    </div>
    <!-- 预览 -->
    <div class="import-preview" id="import-preview-content"></div>
    <!-- 导入策略 -->
    <div class="form-label" style="margin-bottom:0.5rem">导入策略</div>
    <div class="import-strategy">
      <label class="strategy-opt selected" data-value="merge">
        <input type="radio" name="import-strategy" value="merge" checked>
        <div class="strategy-opt-body">
          <div class="strategy-opt-title">合并（推荐）</div>
          <div class="strategy-opt-desc">跳过重复书签，只新增不存在的书签</div>
        </div>
      </label>
      <label class="strategy-opt" data-value="overwrite">
        <input type="radio" name="import-strategy" value="overwrite">
        <div class="strategy-opt-body">
          <div class="strategy-opt-title">覆盖</div>
          <div class="strategy-opt-desc">清空现有书签，完整替换为导入内容（可用撤销恢复）</div>
        </div>
      </label>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="App.closeImportModal()">取消</button>
      <button class="btn-primary" onclick="App.confirmImport()">确认导入</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="./app.js"></script>
</body>
</html>
